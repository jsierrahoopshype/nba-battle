<script>
// ═══════════════════════════ SPEED AUDIT ═══════════════════════════
// Every place ball velocity is set or modified:
//  1. Ball constructor (line ~834): initial spd = (1.6+random*0.7)*(0.8+sf*0.2) → ~1.4–2.5
//  2. Momentum nudge (line ~892): vx/vy += (random-0.5)*0.3 → ±0.15 every 2-3s
//  3. Endgame boost (line ~899): position += v * endgameBoost (lerped to 1.0/1.3/1.6)
//  4. Circle wall bounce (line ~907): reflection, no speed gain (vx-=2*dot*nx)
//  5. Polygon wall bounce (line ~728): reflection, no speed gain
//  6. Collision impulse (line ~1072): imp = dv*1.2, applied to both balls
//  7. Min bounce speed (line ~1077): clamp up to 1.4 after collision
//  8. Max speed cap: clampSpeed() called after every velocity change, caps at 4.0
// ═══════════════════════════════════════════════════════════════════

// ═══════════════════════════ AUDIO ENGINE ═══════════════════════════
let _audioCtx=null, _masterGain=null, _audioDest=null, _muted=false;

function getAudioCtx(){
  if(!_audioCtx){
    _audioCtx=new (window.AudioContext||window.webkitAudioContext)();
    _masterGain=_audioCtx.createGain();
    _masterGain.connect(_audioCtx.destination);
    // MediaStreamDestination for recording audio
    if(_audioCtx.createMediaStreamDestination){
      _audioDest=_audioCtx.createMediaStreamDestination();
      _masterGain.connect(_audioDest);
    }
  }
  if(_audioCtx.state==='suspended') _audioCtx.resume();
  return _audioCtx;
}
function getAudioOut(){ getAudioCtx(); return _masterGain; }
function getAudioStream(){ getAudioCtx(); return _audioDest?_audioDest.stream:null; }
document.addEventListener('click',()=>getAudioCtx(),{once:true});

function toggleMute(){
  _muted=!_muted;
  if(_masterGain) _masterGain.gain.value=_muted?0:1;
  document.getElementById('muteBtn').textContent=_muted?'🔇 UNMUTE':'🔊 MUTE';
}

function _makeNoise(ctx,dur){
  const sz=ctx.sampleRate*dur,buf=ctx.createBuffer(1,sz,ctx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<sz;i++) d[i]=Math.random()*2-1;
  const src=ctx.createBufferSource();src.buffer=buf;return src;
}
function _makeDistortion(ctx,amount){
  const ws=ctx.createWaveShaper(),c=new Float32Array(256);
  for(let i=0;i<256;i++){const x=i*2/255-1;c[i]=Math.sign(x)*Math.pow(Math.abs(x),1/amount);}
  ws.curve=c;ws.oversample='4x';return ws;
}

function sndCollision(speed){
  if(_muted) return;
  const ctx=getAudioCtx(), out=getAudioOut(), t=ctx.currentTime;
  const vol=Math.min(0.6,speed*0.08);

  // Layer 1: metallic CLANG — sawtooth 600hz, distortion, 0.4s decay
  const g1=ctx.createGain();
  g1.gain.setValueAtTime(vol*0.5,t+0.002);
  g1.gain.exponentialRampToValueAtTime(0.001,t+0.4);
  g1.connect(out);
  const dist=_makeDistortion(ctx,4);
  dist.connect(g1);
  const o1=ctx.createOscillator();
  o1.type='sawtooth';
  o1.frequency.setValueAtTime(600+Math.random()*80,t);
  o1.frequency.exponentialRampToValueAtTime(180,t+0.4);
  o1.connect(dist);
  o1.start(t);o1.stop(t+0.4);

  // Layer 2: steel SCRAPE — bandpass noise at 2000hz, 0.15s
  const g2=ctx.createGain();
  g2.gain.setValueAtTime(vol*0.35,t);
  g2.gain.exponentialRampToValueAtTime(0.001,t+0.15);
  g2.connect(out);
  const bp=ctx.createBiquadFilter();
  bp.type='bandpass';bp.frequency.value=2000;bp.Q.value=2;
  bp.connect(g2);
  const noise=_makeNoise(ctx,0.15);
  noise.connect(bp);
  noise.start(t);noise.stop(t+0.15);

  // Layer 3: low IMPACT thud — sine 120hz, 0.1s
  const g3=ctx.createGain();
  g3.gain.setValueAtTime(vol*0.7,t);
  g3.gain.exponentialRampToValueAtTime(0.001,t+0.1);
  g3.connect(out);
  const o3=ctx.createOscillator();
  o3.type='sine';o3.frequency.value=120;
  o3.connect(g3);
  o3.start(t);o3.stop(t+0.1);
}

function sndSpark(){
  if(_muted) return;
  const ctx=getAudioCtx(), out=getAudioOut(), t=ctx.currentTime;

  // Electric sizzle: high-filtered noise with 30hz tremolo, 0.12s
  const g=ctx.createGain();
  g.gain.setValueAtTime(0.18,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.12);
  g.connect(out);
  // Tremolo via LFO modulating gain
  const trem=ctx.createGain();
  trem.gain.value=0.5;
  trem.connect(g);
  const lfo=ctx.createOscillator();
  lfo.frequency.value=30;
  const lfoG=ctx.createGain();
  lfoG.gain.value=0.5;
  lfo.connect(lfoG);
  lfoG.connect(trem.gain);
  lfo.start(t);lfo.stop(t+0.12);
  const hp=ctx.createBiquadFilter();
  hp.type='highpass';hp.frequency.value=4000;
  hp.connect(trem);
  const n=_makeNoise(ctx,0.12);
  n.connect(hp);
  n.start(t);n.stop(t+0.12);
}

function sndElimination(){
  if(_muted) return;
  const ctx=getAudioCtx(), out=getAudioOut(), t=ctx.currentTime;

  // Layer 1: deep explosion — sine 60hz, gain 1.5, 0.6s
  const g1=ctx.createGain();
  g1.gain.setValueAtTime(1.5,t);
  g1.gain.exponentialRampToValueAtTime(0.001,t+0.6);
  g1.connect(out);
  const o1=ctx.createOscillator();
  o1.type='sine';o1.frequency.setValueAtTime(60,t);
  o1.frequency.exponentialRampToValueAtTime(30,t+0.6);
  o1.connect(g1);o1.start(t);o1.stop(t+0.6);

  // Layer 2: mid crunch — sawtooth 200hz with distortion, 0.3s
  const g2=ctx.createGain();
  g2.gain.setValueAtTime(0.5,t);
  g2.gain.exponentialRampToValueAtTime(0.001,t+0.3);
  g2.connect(out);
  const dist=_makeDistortion(ctx,6);
  dist.connect(g2);
  const o2=ctx.createOscillator();
  o2.type='sawtooth';o2.frequency.setValueAtTime(200,t);
  o2.frequency.exponentialRampToValueAtTime(60,t+0.3);
  o2.connect(dist);o2.start(t);o2.stop(t+0.3);

  // Layer 3: high shatter — noise at 3000hz, 0.2s
  const g3=ctx.createGain();
  g3.gain.setValueAtTime(0.4,t);
  g3.gain.exponentialRampToValueAtTime(0.001,t+0.2);
  g3.connect(out);
  const bp=ctx.createBiquadFilter();
  bp.type='bandpass';bp.frequency.value=3000;bp.Q.value=1.5;
  bp.connect(g3);
  const n=_makeNoise(ctx,0.2);
  n.connect(bp);n.start(t);n.stop(t+0.2);
}

function sndVictory(){
  if(_muted) return;
  const ctx=getAudioCtx(), out=getAudioOut(), t=ctx.currentTime;

  // 5 ascending tones with delay-based reverb
  const tones=[300,450,600,800,1100];
  tones.forEach((f,i)=>{
    const start=t+i*0.18;
    // Dry path
    const g=ctx.createGain();
    g.gain.setValueAtTime(0.25,start);
    g.gain.exponentialRampToValueAtTime(0.001,start+0.18);
    g.connect(out);
    // Reverb echo (delay 0.08s, gain 0.3)
    const del=ctx.createDelay(0.2);
    del.delayTime.value=0.08;
    const dg=ctx.createGain();
    dg.gain.value=0.3;
    del.connect(dg);dg.connect(out);
    const merge=ctx.createGain();
    merge.connect(g);merge.connect(del);
    const o=ctx.createOscillator();
    o.type='sine';o.frequency.value=f;
    o.connect(merge);
    o.start(start);o.stop(start+0.18);
  });

  // Sustained chord (300+450+600hz together, 0.4s fade)
  const chordStart=t+tones.length*0.18;
  [300,450,600].forEach(f=>{
    const g=ctx.createGain();
    g.gain.setValueAtTime(0.2,chordStart);
    g.gain.exponentialRampToValueAtTime(0.001,chordStart+0.4);
    g.connect(out);
    const del=ctx.createDelay(0.2);
    del.delayTime.value=0.08;
    const dg=ctx.createGain();
    dg.gain.value=0.3;
    del.connect(dg);dg.connect(out);
    const merge=ctx.createGain();
    merge.connect(g);merge.connect(del);
    const o=ctx.createOscillator();
    o.type='sine';o.frequency.value=f;
    o.connect(merge);
    o.start(chordStart);o.stop(chordStart+0.4);
  });
}

const PLAYERS_JSON_URL = 'https://jsierrahoopshype.github.io/nba-headshots/metadata/players.json';
const ACTIVE_JSON_URL = 'https://jsierrahoopshype.github.io/nba-headshots/metadata/active.json';

function _slugToName(slug){
  // slug format: "firstname-lastname" or "firstname-middle-lastname"
  return slug.split('-').map(w=>w.charAt(0).toUpperCase()+w.slice(1)).join(' ');
}

function _mergeIntoDB(players, source){
  const byId=new Map(FULL_DB.map(p=>[p.id,p]));
  let added=0;
  players.forEach(p=>{
    if(!byId.has(p.id)){
      byId.set(p.id,p);
      added++;
    }
  });
  FULL_DB=Array.from(byId.values());
  console.log(`Merged ${added} new players from ${source}, total now: ${FULL_DB.length}`);
}

(async function loadFullDB(){
  const tried=[];

  // Step 1a: Fetch players.json
  try{
    tried.push(PLAYERS_JSON_URL);
    const r=await fetch(PLAYERS_JSON_URL);
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const data=await r.json();
    if(Array.isArray(data)&&data.length>0){
      console.log(`players.json returned ${data.length} entries`);
      const pdataById=new Map(PDATA.map(p=>[p.id,p]));
      const mapped=data.map(p=>{
        const existing=pdataById.get(p.id);
        if(existing) return existing;
        return {id:p.id,slug:p.slug||'',name:p.name,team:p.team||'',color:'#4488cc',bg:'#0d1b2a',icon:''};
      });
      FULL_DB=mapped;
      // Re-add any PDATA entries that might be missing
      const inDb=new Set(FULL_DB.map(p=>p.id));
      PDATA.forEach(p=>{if(!inDb.has(p.id))FULL_DB.push(p);});
    }
  }catch(e){console.warn('players.json fetch failed:',e.message);}

  // Step 1b: Fetch active.json
  try{
    tried.push(ACTIVE_JSON_URL);
    const r=await fetch(ACTIVE_JSON_URL);
    if(!r.ok) throw new Error(`HTTP ${r.status}`);
    const data=await r.json();
    if(Array.isArray(data)&&data.length>0){
      console.log(`active.json returned ${data.length} entries`);
      const mapped=data.map(p=>({id:p.id,slug:p.slug||'',name:p.name,team:p.team||'',color:'#4488cc',bg:'#0d1b2a',icon:''}));
      _mergeIntoDB(mapped,'active.json');
    }
  }catch(e){console.warn('active.json fetch failed:',e.message);}

  console.log(`After Step 1: ${FULL_DB.length} players`);

  // Step 2: If under 500, fetch GitHub tree API for headshot filenames
  if(FULL_DB.length<500){
    try{
      tried.push(TREE_API_URL);
      const r=await fetch(TREE_API_URL);
      if(!r.ok) throw new Error(`HTTP ${r.status}`);
      const data=await r.json();
      if(data.tree&&Array.isArray(data.tree)){
        const pat=/^players\/headshots\/face\/(\d+)-(.+)\.png$/;
        const parsed=[];
        data.tree.forEach(f=>{
          const m=f.path.match(pat);
          if(m){
            const id=+m[1], slug=m[1]+'-'+m[2], name=_slugToName(m[2]);
            parsed.push({id,slug,name,team:'',color:'#4488cc',bg:'#0d1b2a',icon:''});
          }
        });
        console.log(`GitHub tree API returned ${parsed.length} headshot files`);
        _mergeIntoDB(parsed,'GitHub tree API');
      }
    }catch(e){console.warn('GitHub tree API fetch failed:',e.message);}
  }

  // Step 3: Final dedup (by id) and sort
  const seen=new Map();
  FULL_DB.forEach(p=>{if(!seen.has(p.id))seen.set(p.id,p);});
  FULL_DB=Array.from(seen.values());

  FULL_DB_LOADED=true;
  console.log(`Total players available: ${FULL_DB.length}`);
  if(FULL_DB.length<500){
    console.warn(`WARNING: Only ${FULL_DB.length} players loaded (target was 500+). URLs tried:`);
    tried.forEach(u=>console.warn('  -',u));
  }
})();

function loadImages(roster, cb){

        const img2 = new Image();

    // Skip NBA headshot load for custom players (no slug) — they use customImg or bg fallback
    if(!p.slug){ IMGS[p.id]=null; pending--; if(pending===0) cb(); return; }

    img.onerror = ()=>{

const FACE_CACHE = {};
function getFace(p, r){
  const ckey = p.customImg ? 'c_'+p.customImg+'_'+Math.round(r) : p.id+'_'+Math.round(r);
  if(FACE_CACHE[ckey]) return FACE_CACHE[ckey];
  const sz = r*2;
  const oc = document.createElement('canvas'); oc.width=sz; oc.height=sz;
  const c = oc.getContext('2d');
  c.beginPath(); c.arc(r,r,r,0,Math.PI*2); c.clip();
  c.fillStyle = p.bg; c.fillRect(0,0,sz,sz);
  const img = (p.customImg && CUSTOM_IMGS[p.customImg] && CUSTOM_IMGS[p.customImg]!=='loading')
    ? CUSTOM_IMGS[p.customImg] : IMGS[p.id];
  if(img && img.naturalWidth>0 && img.naturalHeight>0){
    try{
      const aw=img.naturalWidth, ah=img.naturalHeight;
      const scale = (sz*1.05)/Math.min(aw,ah);
      const dw=aw*scale, dh=ah*scale;
      c.drawImage(img, (sz-dw)/2, (sz-dh)/2, dw, dh);
    }catch(e){
      drawInitials(c, p, r, sz);
    }
  } else {
    drawInitials(c, p, r, sz);
  }
  FACE_CACHE[ckey] = oc;
  return oc;
}
function drawInitials(c, p, r, sz){
  const text = p._team && p.team ? p.team : getInitials(p.name);
  const fontSize = text.length>2 ? Math.round(r*.65) : Math.round(r*.9);
  c.fillStyle = p.color;
  c.font = `700 ${fontSize}px 'Bebas Neue','Barlow Condensed',sans-serif`;
  c.textAlign = 'center'; c.textBaseline = 'middle';
  c.fillText(text, r, r*1.05);
}

function hex3(h){const n=parseInt(h.replace('#',''),16);return[(n>>16)&255,(n>>8)&255,n&255];}
function rgba(h,a){const[r,g,b]=hex3(h);return`rgba(${r},${g},${b},${a})`;}
function lerpc(h1,h2,t){
  const[r1,g1,b1]=hex3(h1),[r2,g2,b2]=hex3(h2);
  return`rgb(${~~(r1+(r2-r1)*t)},${~~(g1+(g2-g1)*t)},${~~(b1+(b2-b1)*t)})`;
}
function rrect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

// ════════════════════════════ ARENA SHAPES ════════════════════════════
// Returns vertices for polygon shapes (equal area to circle with radius AR)
function getArenaVerts(shape){
  const circleArea = Math.PI*AR*AR;
  if(shape==='square'){
    const half = Math.sqrt(circleArea)/2;
    return [{x:CX-half,y:CY-half},{x:CX+half,y:CY-half},{x:CX+half,y:CY+half},{x:CX-half,y:CY+half}];
  }
  if(shape==='triangle'){
    const triSide = Math.sqrt(circleArea*4/Math.sqrt(3));
    const h = triSide*Math.sqrt(3)/2;
    const cy2 = CY+h/6; // shift down so visually centered
    return [{x:CX,y:cy2-h*2/3},{x:CX+triSide/2,y:cy2+h/3},{x:CX-triSide/2,y:cy2+h/3}];
  }
  if(shape==='hexagon'){
    const hexR = Math.sqrt(circleArea*2/(3*Math.sqrt(3)));
    const verts=[];
    for(let i=0;i<6;i++){
      const a = Math.PI/6+i*Math.PI/3; // flat-top hexagon
      verts.push({x:CX+Math.cos(a)*hexR, y:CY+Math.sin(a)*hexR});
    }
    return verts;
  }
  return null; // circle
}

// Trace arena shape path on ctx
function traceArenaPath(shape, inset){
  const ins = inset||0;
  if(shape==='circle'||!shape){
    ctx.beginPath();ctx.arc(CX,CY,AR-ins,0,Math.PI*2);
    return;
  }
  const verts = getArenaVerts(shape);
  if(!verts) return;
  // Inset vertices toward center
  const iv = verts.map(v=>{
    const dx=v.x-CX, dy=v.y-CY, d=Math.hypot(dx,dy);
    return d>0?{x:v.x-dx/d*ins, y:v.y-dy/d*ins}:{...v};
  });
  ctx.beginPath();
  if(shape==='square'){
    const cr = Math.max(0,20-ins);
    const x0=iv[0].x, y0=iv[0].y, x1=iv[2].x, y1=iv[2].y;
    const w=x1-x0, h=y1-y0;
    rrect(x0,y0,w,h,cr);
    return;
  }
  ctx.moveTo(iv[0].x,iv[0].y);
  for(let i=1;i<iv.length;i++) ctx.lineTo(iv[i].x,iv[i].y);
  ctx.closePath();
}

// Polygon wall collision: reflect ball off nearest edge if outside
// Precompute edge normals for a shape (cached per shape string)
const EDGE_NORMALS = {};
function getEdgeNormals(shape, verts){
  if(EDGE_NORMALS[shape]) return EDGE_NORMALS[shape];
  const n=verts.length, edges=[];
  for(let i=0;i<n;i++){
    const v1=verts[i], v2=verts[(i+1)%n];
    let nx=-(v2.y-v1.y), ny=v2.x-v1.x;
    const nl=Math.hypot(nx,ny);
    nx/=nl; ny/=nl;
    const mx=(v1.x+v2.x)/2, my=(v1.y+v2.y)/2;
    if(nx*(CX-mx)+ny*(CY-my)<0){nx=-nx;ny=-ny;}
    edges.push({v1,v2,nx,ny});
  }
  EDGE_NORMALS[shape]=edges;
  return edges;
}

function polyWallCollide(ball, verts){
  const shape=CFG.arenaShape||'circle';
  const edges=getEdgeNormals(shape,verts);
  const br=ball.r;
  // Multiple passes to handle corners and high-speed overshoots
  for(let pass=0;pass<3;pass++){
    let pushed=false;
    for(let i=0;i<edges.length;i++){
      const {v1,nx,ny}=edges[i];
      // Use live ball position each iteration
      const dist=(ball.x-v1.x)*nx+(ball.y-v1.y)*ny;
      if(dist<br){
        const dot=ball.vx*nx+ball.vy*ny;
        if(dot<0){
          ball.vx-=2*dot*nx;
          ball.vy-=2*dot*ny;
        }
        ball.x+=nx*(br-dist);
        ball.y+=ny*(br-dist);
        pushed=true;
      }
    }
    if(!pushed) break;
  }
}

function initGame(){
  N = CFG.roster.length;
  CX = W/2; CY = H*0.468; AR = 260;
  BR = Math.max(18, Math.min(36, Math.floor(AR/(N*1.5))));
  // Clear cached edge normals (depend on CX/CY/AR)
  Object.keys(EDGE_NORMALS).forEach(k=>delete EDGE_NORMALS[k]);
  eliminated = Array(N).fill(false);
  aliveCnt = N;
  flash = null; particles = []; dmgNums = [];
  screenShake = {x:0, y:0, mag:0};
  endWinner = -1;
  endgameBoost = 1.0;
  endgameBoostTarget = 1.0;
  lastElimT = 0;
  roundDur = pickRoundDur();
  timerAcc = 0;
  roundTimer = roundDur;

  // Compress strength factor: max/min ratio capped at 1.6x
  const pcts = CFG.roster.map(p=>p.winPct||10);
  const minPct = Math.min(...pcts), maxPct = Math.max(...pcts);
  balls = CFG.roster.map((p,i)=>{
    const pct = p.winPct||10;
    const t = maxPct>minPct ? (pct-minPct)/(maxPct-minPct) : 0.5;
    const sf = 0.75 + t*0.45; // range [0.75, 1.2], ratio = 1.6
    return new Ball(i, sf);
  });
}

// ════════════════════════════ BALL ════════════════════════════
class Ball {
  constructor(idx, sf){
    this.idx = idx;
    this.p   = CFG.roster[idx];
    this.sf  = sf; // strength factor
    this.maxHP = 82;
    this.hp    = this.maxHP;
    this.r     = BR; this.baseR = BR;

    const a = (idx/N)*Math.PI*2-Math.PI/2;
    const d = AR*0.44;
    this.x = CX+Math.cos(a)*d;
    this.y = CY+Math.sin(a)*d;

    const spd = (1.6+Math.random()*0.7)*(0.8+sf*0.2);
    const va  = a+Math.PI+(Math.random()-.5)*1.0;
    this.vx = Math.cos(va)*spd;
    this.vy = Math.sin(va)*spd;

    this.trail = [];
    this.alpha = 1;
    this.dead  = false; this.deadT = 0;
    this.hitF  = 0; // hit flash frames
    this.atkF  = 0; // attack flash frames
    this.bladeAngle = Math.random()*Math.PI*2; // saw blade rotation
    this.sawBoostF = 0; // frames of 3x spin boost after collision
    this.nudgeTimer = 2.0+Math.random()*1.0; // momentum nudge every 2-3s
  }

  clampSpeed(){
    const s=Math.hypot(this.vx,this.vy);
    if(s>MAX_BALL_SPEED){const f=MAX_BALL_SPEED/s;this.vx*=f;this.vy*=f;}
  }

  get alive(){ return !this.dead && this.hp>0; }

  hit(dmg){
    if(!this.alive) return 0;
    const taken = dmg*Math.max(0.7, 1/(0.5+this.sf*0.5));
    this.hp = Math.max(0, this.hp-taken);
    this.hitF = 10;
    if(this.hp<=0){ this.die(); }
    return taken;
  }

  die(){
    if(this.dead) return;
    this.dead = true; this.deadT = performance.now();
    eliminated[this.idx] = true;
    aliveCnt--;
    lastElimT = performance.now();
    // Update endgame boost target — lerps gradually in update loop
    endgameBoostTarget = aliveCnt<=2 ? 1.6 : aliveCnt<=3 ? 1.3 : 1.0;
    shake(14);
    spawnExplosion(this.x, this.y, this.p.color);
    sndElimination();
    if(aliveCnt<=1) setTimeout(()=>triggerEnd(), 400);
  }

  update(){
    if(this.dead){
      const t = (performance.now()-this.deadT)/1200;
      this.alpha = Math.max(0,1-t);
      this.r = this.baseR*Math.max(.01,1-Math.max(0,t-.3)/.7);
      this.trail=[];
      return;
    }
    if(this.hitF>0) this.hitF--;
    if(this.atkF>0) this.atkF--;
    if(this.sawBoostF>0) this.sawBoostF--;
    // Saw blade spin (all players have saw blade now)
    const sawBase = endgameBoost>1 ? 0.14 : 0.06;
    this.bladeAngle += this.sawBoostF>0 ? sawBase*3 : sawBase;

    // Lerp endgameBoost toward target (~1 second transition at 60fps)
    if(endgameBoost!==endgameBoostTarget){
      endgameBoost += (endgameBoostTarget-endgameBoost)*0.02;
      if(Math.abs(endgameBoost-endgameBoostTarget)<0.005) endgameBoost=endgameBoostTarget;
    }

    // Momentum nudge: small random velocity bump every 2-3 seconds
    this.nudgeTimer -= 1/60;
    if(this.nudgeTimer<=0){
      this.vx += (Math.random()-0.5)*0.3; // ±0.15
      this.vy += (Math.random()-0.5)*0.3;
      this.clampSpeed();
      this.nudgeTimer = 2.0+Math.random()*1.0;
    }

    this.trail.push({x:this.x,y:this.y});
    if(this.trail.length>14) this.trail.shift();
    this.x+=this.vx*endgameBoost; this.y+=this.vy*endgameBoost;

    // Arena wall
    const shape = CFG.arenaShape||'circle';
    if(shape==='circle'){
      const dx=this.x-CX,dy=this.y-CY,dist=Math.hypot(dx,dy),wall=AR-this.r;
      if(dist>wall&&dist>0){
        const nx=dx/dist,ny=dy/dist,dot=this.vx*nx+this.vy*ny;
        this.vx-=2*dot*nx; this.vy-=2*dot*ny;
        this.x=CX+nx*wall; this.y=CY+ny*wall;
        this.clampSpeed();
      }
    } else {
      const verts = getArenaVerts(shape);
      if(verts){ polyWallCollide(this, verts); this.clampSpeed(); }
    }
  }

  draw(){
    if(this.alpha<=0.01) return;
    ctx.save(); ctx.globalAlpha=this.alpha;
    const p=this.p;

    // Trail
    for(let j=0;j<this.trail.length;j++){
      const tf=j/this.trail.length,pt=this.trail[j];
      ctx.beginPath();ctx.arc(pt.x,pt.y,this.r*tf*.4,0,Math.PI*2);
      ctx.fillStyle=rgba(p.color,tf*.18);ctx.fill();
    }

    // Outer glow
    const grd=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r*2.1);
    grd.addColorStop(0,rgba(p.color,this.atkF>0?.45:.15));
    grd.addColorStop(1,rgba(p.color,0));
    ctx.beginPath();ctx.arc(this.x,this.y,this.r*2.1,0,Math.PI*2);
    ctx.fillStyle=grd;ctx.fill();

    // SAW BLADE — centered on ball, teeth extend beyond ball rim (all players)
    if(!this.dead){
      const discR = this.r; // disc matches ball radius
      const toothLen = this.r*0.28; // teeth extend beyond disc
      const teethN = 24;
      const toothW = this.r*0.06; // half-width of tooth base
      const sx = this.x, sy = this.y;
      const isHit = this.atkF>0;

      ctx.save();
      if(isHit){
        ctx.shadowColor='#ff8800';ctx.shadowBlur=18;
      } else {
        ctx.shadowColor='rgba(170,200,255,.4)';ctx.shadowBlur=6;
      }

      // Disc body — radial gradient gunmetal to chrome
      const dg=ctx.createRadialGradient(sx,sy,0,sx,sy,discR);
      if(isHit){
        dg.addColorStop(0,'#ff8800');dg.addColorStop(0.5,'#ffaa44');dg.addColorStop(1,'#ffe0aa');
      } else {
        dg.addColorStop(0,'#1a1a1a');dg.addColorStop(0.6,'#666666');dg.addColorStop(1,'#cccccc');
      }
      ctx.beginPath();ctx.arc(sx,sy,discR,0,Math.PI*2);
      ctx.fillStyle=dg;ctx.fill();
      ctx.shadowBlur=0;

      // Teeth + gullets
      for(let k=0;k<teethN;k++){
        const ta = this.bladeAngle+(k/teethN)*Math.PI*2;
        const taNext = this.bladeAngle+((k+0.5)/teethN)*Math.PI*2;
        const tipX=sx+Math.cos(ta)*(discR+toothLen);
        const tipY=sy+Math.sin(ta)*(discR+toothLen);
        const perpX=-Math.sin(ta)*toothW, perpY=Math.cos(ta)*toothW;
        const bx1=sx+Math.cos(ta)*discR+perpX, by1=sy+Math.sin(ta)*discR+perpY;
        const bx2=sx+Math.cos(ta)*discR-perpX, by2=sy+Math.sin(ta)*discR-perpY;
        ctx.beginPath();
        ctx.moveTo(bx1,by1);ctx.lineTo(tipX,tipY);ctx.lineTo(bx2,by2);
        ctx.closePath();
        ctx.fillStyle=isHit?'#ffcc66':'#aaaaaa';
        ctx.fill();

        const gx=sx+Math.cos(taNext)*discR*0.92;
        const gy=sy+Math.sin(taNext)*discR*0.92;
        ctx.beginPath();ctx.arc(gx,gy,toothW*0.8,0,Math.PI*2);
        ctx.fillStyle=isHit?'#aa4400':'#0a0a0a';ctx.fill();
      }
      ctx.restore();
    }

    // Face (on top of saw disc)
    try{
      const face=getFace(p,this.r);
      ctx.save();
      ctx.beginPath();ctx.arc(this.x,this.y,this.r-.5,0,Math.PI*2);ctx.clip();
      ctx.drawImage(face,this.x-this.r,this.y-this.r,this.r*2,this.r*2);
      ctx.restore();
    }catch(e){
      ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
      ctx.fillStyle=p.bg;ctx.fill();
    }

    // Hit flash
    if(this.hitF>0){
      ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,30,30,${this.hitF/10*.6})`;ctx.fill();
    }

    // Ring
    ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);
    ctx.strokeStyle=this.atkF>0?'#fff':p.color;
    ctx.lineWidth=Math.max(2.5,this.r*.07);
    ctx.shadowColor=this.atkF>0?'#fff':p.color;
    ctx.shadowBlur=this.atkF>0?24:10;
    ctx.stroke();ctx.shadowBlur=0;

    // Energy arc
    if(!this.dead){
      const hf=this.hp/this.maxHP;
      const rOut=this.r+6;
      ctx.beginPath();ctx.arc(this.x,this.y,rOut,0,Math.PI*2);
      ctx.strokeStyle='rgba(0,0,0,.5)';ctx.lineWidth=3.5;ctx.stroke();
      if(hf>0){
        const hcol=hf>.5?lerpc('#00ff88','#ffcc00',(1-hf)*2):lerpc('#ffcc00','#ff2244',(.5-hf)*2);
        ctx.beginPath();ctx.arc(this.x,this.y,rOut,-Math.PI/2,-Math.PI/2+Math.PI*2*hf);
        ctx.strokeStyle=hcol;ctx.lineWidth=3.5;
        ctx.shadowColor=hcol;ctx.shadowBlur=8;
        ctx.stroke();ctx.shadowBlur=0;
      }
    }

    // Orbiting icon companion (only if player has icon/iconUrl set)
    if(!this.dead){
      const pIcon = this.p.icon;
      const pIconUrl = this.p.iconUrl;
      if(pIconUrl && ICON_IMGS[pIconUrl] && ICON_IMGS[pIconUrl]!=='loading'){
        const orbitR = this.r*1.8;
        const imgSz = this.r*0.9;
        const ix = this.x+Math.cos(this.bladeAngle)*orbitR;
        const iy = this.y+Math.sin(this.bladeAngle)*orbitR;
        ctx.save();
        ctx.beginPath();ctx.arc(ix,iy,imgSz,0,Math.PI*2);ctx.clip();
        ctx.drawImage(ICON_IMGS[pIconUrl],ix-imgSz,iy-imgSz,imgSz*2,imgSz*2);
        ctx.restore();
        if(this.atkF>0){ctx.beginPath();ctx.arc(ix,iy,imgSz,0,Math.PI*2);ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.shadowColor='#fff';ctx.shadowBlur=14;ctx.stroke();ctx.shadowBlur=0;}
      } else if(pIcon){
        const orbitR = this.r*1.5;
        const fontSize = this.r*0.55;
        const ix = this.x+Math.cos(this.bladeAngle)*orbitR;
        const iy = this.y+Math.sin(this.bladeAngle)*orbitR;
        ctx.save();
        ctx.font = `${fontSize}px sans-serif`;
        ctx.textAlign='center';ctx.textBaseline='middle';
        if(this.atkF>0){ctx.shadowColor='#fff';ctx.shadowBlur=14;}
        ctx.fillText(pIcon,ix,iy);
        ctx.shadowBlur=0;
        ctx.restore();
      }
    }

    ctx.restore();
  }
}

// ════════════════════════════ PHYSICS + COMBAT ════════════════════════════
function physicsStep(){
  for(let i=0;i<N;i++){
    if(eliminated[i]||!balls[i].alive) continue;
    for(let j=i+1;j<N;j++){
      if(eliminated[j]||!balls[j].alive) continue;
      const bi=balls[i], bj=balls[j];
      const dx=bj.x-bi.x, dy=bj.y-bi.y, d=Math.hypot(dx,dy), mn=bi.r+bj.r;
      if(d<mn&&d>.01){
        const nx=dx/d, ny=dy/d;
        const dv=(bi.vx-bj.vx)*nx+(bi.vy-bj.vy)*ny;
        if(dv>0){
          // 1.2x impulse for punchy but survivable bounces
          const imp=dv*1.2;
          bi.vx-=imp*nx; bi.vy-=imp*ny;
          bj.vx+=imp*nx; bj.vy+=imp*ny;

          // Enforce minimum bounce speed of 1.4, max of MAX_BALL_SPEED
          const minSpd=1.4;
          let si=Math.hypot(bi.vx,bi.vy);
          if(si>0.01&&si<minSpd){const s=minSpd/si;bi.vx*=s;bi.vy*=s;si=minSpd;}
          bi.clampSpeed(); si=Math.hypot(bi.vx,bi.vy);
          let sj=Math.hypot(bj.vx,bj.vy);
          if(sj>0.01&&sj<minSpd){const s=minSpd/sj;bj.vx*=s;bj.vy*=s;sj=minSpd;}
          bj.clampSpeed(); sj=Math.hypot(bj.vx,bj.vy);

          // COMBAT
          const relV = Math.abs(dv);
          if(relV>.4){
            const spdI=si, spdJ=sj;
            // Attacker is the faster ball
            if(spdI>=spdJ-0.3){
              const dmg=relV*bi.sf*0.04;
              const taken=bj.hit(dmg);
              if(taken>0){ bi.atkF=6; spawnClash(bj.x,bj.y,bi.p.color); spawnBladeSparks(bi); spawnDmg(bj.x,bj.y,Math.round(taken),bi.p.color); shake(Math.min(9,relV*1.8)); sndCollision(relV); sndSpark(); }
            }
            if(spdJ>=spdI-0.3){
              const dmg=relV*bj.sf*0.04;
              const taken=bi.hit(dmg);
              if(taken>0){ bj.atkF=6; spawnClash(bi.x,bi.y,bj.p.color); spawnBladeSparks(bj); spawnDmg(bi.x,bi.y,Math.round(taken),bj.p.color); shake(Math.min(9,relV*1.8)); sndCollision(relV); sndSpark(); }
            }
          }
        }
        // Push apart by full overlap + 3px extra to prevent sticking
        const push=(mn-d)/2+1.5;
        bi.x-=nx*push; bi.y-=ny*push; bj.x+=nx*push; bj.y+=ny*push;
      }
    }
  }
}

// ════════════════════════════ EFFECTS ════════════════════════════
function shake(mag){ screenShake.mag=Math.max(screenShake.mag, mag*(endgameBoost>1?1.5:1)); }

function spawnClash(x,y,col){
  const n=endgameBoost>1?20:10;
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, spd=2+Math.random()*6;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,size:1.5+Math.random()*3.5,color:col,life:1,spark:true});
  }
  particles.push({x,y,vx:0,vy:0,size:18,color:col,life:1,ring:true});
}

function spawnBladeSparks(ball){
  ball.sawBoostF=8; // all players have saw blade
  const sparkColors=['#ff8800','#ffaa33','#ffffff','#ffcc44'];
  for(let k=0;k<12;k++){
    const sa=Math.random()*Math.PI*2, sp=3+Math.random()*5;
    for(let j=0;j<8;j++){
      const a2=sa+(Math.random()-.5)*1.2, sp2=sp*(0.6+Math.random()*0.8);
      particles.push({x:ball.x,y:ball.y,vx:Math.cos(a2)*sp2,vy:Math.sin(a2)*sp2,size:1+Math.random()*2.5,color:sparkColors[~~(Math.random()*sparkColors.length)],life:1,spark:true});
    }
  }
}

function spawnExplosion(x,y,col){
  const n=endgameBoost>1?48:24;
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2, spd=1.5+Math.random()*8;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,size:2+Math.random()*5,color:[col,'#fff','#ffdd44'][~~(Math.random()*3)],life:1,spark:true});
  }
}

function spawnCelebration(x,y,c1,c2){
  for(let i=0;i<18;i++){
    const a=Math.random()*Math.PI*2,spd=1+Math.random()*7;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:-2-Math.random()*5,size:2.5+Math.random()*5,color:[c1,'#fff',c2,'#ffdd44'][~~(Math.random()*4)],life:1,spark:false});
  }
}

function spawnDmg(x,y,val,col){ dmgNums.push({x,y:y-12,vy:-1.3,val,color:col,life:1}); }

function updateFX(dt){
  screenShake.mag = Math.max(0, screenShake.mag-1.1);
  if(screenShake.mag>0){
    screenShake.x=(Math.random()-.5)*screenShake.mag*1.5;
    screenShake.y=(Math.random()-.5)*screenShake.mag*1.5;
  } else { screenShake.x=0; screenShake.y=0; }

  particles.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy;
    if(!p.ring) p.vy+=.22;
    p.life-=dt*(p.spark?1.8:.75);
    if(p.ring) p.size+=2.5;
  });
  particles=particles.filter(p=>p.life>0&&(!p.ring||p.size<80));
  dmgNums.forEach(d=>{d.y+=d.vy;d.vy*=.93;d.life-=dt*.85;});
  dmgNums=dmgNums.filter(d=>d.life>0);
}

// ════════════════════════════ ROUND END ════════════════════════════
function triggerEnd(){
  if(phase!=='fight') return;
  const alive=balls.filter((b,i)=>!eliminated[i]&&b.alive);
  endWinner = alive.length===1 ? alive[0].idx : -1;

  const sf = CFG.seriesFormat||1;
  const winsNeeded = Math.ceil(sf/2);

  // Series mode
  if(sf>1 && endWinner>=0){
    const wp = CFG.roster[endWinner];
    seriesScores[wp.id] = (seriesScores[wp.id]||0)+1;
    // Track losses for non-winners
    CFG.roster.forEach((p,i)=>{ if(i!==endWinner) seriesLosses[p.id]=(seriesLosses[p.id]||0)+1; });

    if(seriesScores[wp.id]>=winsNeeded){
      // Series won
      seriesOver = true;
      seriesChampion = endWinner;
      phase='end'; phaseT=performance.now();
      flash={text:'SERIES CHAMPION!',color:wp.color,t:performance.now()};
      sndVictory();
      return;
    }
    // More rounds to play — show splash then auto-restart
    phase='seriesSplash'; seriesSplashT=performance.now();
    flash={text:`${wp.name.split(' ').pop()} ${CFG.winnerMsg}`,color:wp.color,t:performance.now()};
    sndVictory();
    return;
  }

  // Single match or draw
  phase='end'; phaseT=performance.now();
  flash={text:endWinner>=0?`${CFG.roster[endWinner].team} ${CFG.winnerMsg}`:'DRAW!',
         color:endWinner>=0?CFG.roster[endWinner].color:'#fff',t:performance.now()};
  sndVictory();
}


// ════════════════════════════ MAIN LOOP ════════════════════════════
let lastT=performance.now();

function loop(now){
  const dt=Math.min((now-lastT)/1000,.05); lastT=now;

  if(phase==='loading'){
    ctx.fillStyle='#02020a'; ctx.fillRect(0,0,W,H);
    ctx.font=`700 ${W*.06}px 'Bebas Neue',sans-serif`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='rgba(100,130,200,.7)';
    ctx.fillText('LOADING HEADSHOTS…',CX,H/2);
    requestAnimationFrame(loop); return;
  }

  if(phase==='intro'&&now-phaseT>2200){ phase='fight'; timerAcc=0; }

  if(phase==='fight'){
    timerAcc+=dt;
    roundTimer=Math.max(0,roundDur-timerAcc);
    if(roundTimer<=0){
      roundDur=pickRoundDur();
      timerAcc=0; roundTimer=roundDur;
    }
    balls.forEach(b=>b.update());
    physicsStep();
    updateFX(dt);
    // Safety: force end if game is stuck with <=1 alive for 1.5+ seconds
    if(aliveCnt<=1 && lastElimT>0 && now-lastElimT>1500) triggerEnd();
  }
  if(phase==='seriesSplash'){
    updateFX(dt);
    // After 3 seconds, start next round
    if(performance.now()-seriesSplashT>3000){
      seriesRound++;
      startGame(); // starts loading/intro for next round
    }
  }
  if(phase==='end'){
    updateFX(dt);
    if(endWinner>=0){
      const wb=balls[endWinner];
      if(Math.random()<.3) spawnCelebration(wb.x,wb.y,CFG.roster[endWinner].color,CFG.roster[endWinner].bg);
    }
  }

  // Render
  ctx.save();
  if(screenShake.mag>.3) ctx.translate(screenShake.x,screenShake.y);

  drawBg();
  if(phase==='seriesSplash'){
    drawSeriesSplash(now);
  } else {
    drawArenaFloor();
    drawBallsClipped();
    drawArenaRing();
    drawHUD(now);
    if((CFG.seriesFormat||1)>1 && phase!=='end') drawSeriesDots();
    drawFlashFX(now);
    drawDmgNums();
    drawParticles();
    if(phase==='end') drawEndScreen(now);
    if(phase==='intro') drawIntroFade(now);
  }
  drawWatermark();

  ctx.restore();
  checkAutoStop(now);
  requestAnimationFrame(loop);
}

// ════════════════════════════ RENDER ════════════════════════════
function drawBg(){
  ctx.fillStyle='#02020a';ctx.fillRect(0,0,W,H);
  const g=ctx.createRadialGradient(CX,CY,0,CX,CY,AR*1.7);
  g.addColorStop(0,'rgba(15,15,55,.55)');g.addColorStop(1,'rgba(2,2,10,0)');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
}

function drawArenaFloor(){
  const shape=CFG.arenaShape||'circle';
  ctx.save();
  traceArenaPath(shape,1);
  ctx.clip();
  // Re-trace to fill (clip may consume the path in some browsers)
  traceArenaPath(shape,1);
  ctx.fillStyle='#040416';ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.02)';ctx.lineWidth=1;
  [.28,.56,.84].forEach(t=>{ctx.beginPath();ctx.arc(CX,CY,AR*t,0,Math.PI*2);ctx.stroke();});
  ctx.beginPath();ctx.moveTo(CX-AR,CY);ctx.lineTo(CX+AR,CY);
  ctx.moveTo(CX,CY-AR);ctx.lineTo(CX,CY+AR);ctx.stroke();
  ctx.restore();
}

function drawBallsClipped(){
  ctx.save();
  traceArenaPath(CFG.arenaShape||'circle',2);
  ctx.clip();
  balls.forEach(b=>b.draw());
  ctx.restore();
}

function drawArenaRing(){
  const shape=CFG.arenaShape||'circle';
  [{w:28,a:.04},{w:14,a:.09},{w:5,a:.38},{w:2,a:.9}].forEach(({w,a})=>{
    traceArenaPath(shape,0);
    ctx.strokeStyle=`rgba(100,165,255,${a})`;ctx.lineWidth=w;ctx.stroke();
  });
}

function drawHUD(now){
  // Title
  ctx.save();ctx.textAlign='center';ctx.textBaseline='top';
  const lh=W*.09, ty=34;
  CFG.title.forEach((line,i)=>{
    ctx.font=`900 ${W*.085}px 'Bebas Neue',sans-serif`;
    ctx.fillStyle='#fff';ctx.shadowColor='rgba(80,130,255,.9)';ctx.shadowBlur=22;
    ctx.fillText(line,CX,ty+i*lh);
  });
  ctx.shadowBlur=0;
  ctx.font=`700 ${W*.04}px 'Barlow Condensed',sans-serif`;
  ctx.fillStyle='rgba(165,200,255,.7)';
  ctx.fillText(CFG.subtitle,CX,ty+CFG.title.length*lh+3);
  ctx.restore();

  // Score panel
  drawPanel();
}

function drawPanel(){
  const py=CY+AR+18, ph=108, px=18, pw=W-36;
  ctx.save();
  rrect(px,py,pw,ph,12);
  ctx.fillStyle='rgba(4,4,18,.92)';ctx.fill();
  ctx.strokeStyle='rgba(70,120,240,.13)';ctx.lineWidth=1;ctx.stroke();

  const sw=pw/N;
  CFG.roster.forEach((p,i)=>{
    const sx=px+i*sw+sw/2, b=balls[i];
    const dead=eliminated[i]||!b.alive;
    const al=dead?Math.max(.1,b?b.alpha:0):1;
    ctx.save();ctx.globalAlpha=al;

    // Thumb
    const tr=14, ty=py+16;
    ctx.save();ctx.beginPath();ctx.arc(sx,ty,tr,0,Math.PI*2);ctx.clip();
    const face=getFace(p,tr);
    try{ ctx.drawImage(face,sx-tr,ty-tr,tr*2,tr*2); }
    catch(e){ ctx.fillStyle=p.bg;ctx.fillRect(sx-tr,ty-tr,tr*2,tr*2); }
    ctx.restore();
    ctx.beginPath();ctx.arc(sx,ty,tr,0,Math.PI*2);
    ctx.strokeStyle=dead?'#1a1a1a':p.color;ctx.lineWidth=1.8;ctx.stroke();

    // Energy bar
    const bw=sw*.76,bh=5,bx=sx-bw/2,bby=py+38;
    if(!dead){
      const hf=b.hp/b.maxHP;
      ctx.fillStyle='rgba(0,0,0,.5)';rrect(bx,bby,bw,bh,2);ctx.fill();
      const hcol=hf>.5?lerpc('#00ff88','#ffcc00',(1-hf)*2):lerpc('#ffcc00','#ff2244',(.5-hf)*2);
      ctx.fillStyle=hcol;rrect(bx,bby,Math.max(2,bw*hf),bh,2);ctx.fill();
      ctx.font=`600 ${Math.max(8,sw*.16)}px 'Barlow Condensed',sans-serif`;
      ctx.textAlign='center';ctx.textBaseline='top';
      ctx.fillStyle='rgba(180,200,255,.55)';
      ctx.fillText(`${Math.ceil(b.hp)}/${b.maxHP}`,sx,bby+7);
    } else {
      ctx.font=`700 ${Math.max(9,sw*.18)}px 'Bebas Neue',sans-serif`;
      ctx.textAlign='center';ctx.textBaseline='top';
      ctx.fillStyle='#330a0a';ctx.fillText('OUT',sx,bby);
    }
    ctx.restore();
  });
  ctx.restore();
}

function drawFlashFX(now){
  if(!flash) return;
  const p=(now-flash.t)/2000;if(p>=1){flash=null;return;}
  const fa=Math.max(0,1-p*1.1), sc=Math.min(1,.12+p*5.5);
  ctx.save();ctx.globalAlpha=fa;
  ctx.font=`900 ${W*.08*sc}px 'Bebas Neue',sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillStyle=flash.color;ctx.shadowColor=flash.color;ctx.shadowBlur=65;

function drawDmgNums(){

function drawParticles(){
  particles.forEach(p=>{
    ctx.save();ctx.globalAlpha=Math.max(0,p.life*.88);
    if(p.ring){
      ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
      ctx.strokeStyle=p.color;ctx.lineWidth=2;ctx.stroke();
    } else {
      ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);

function drawSeriesDots(){
  const sf=CFG.seriesFormat||1;
  if(sf<=1) return;
  const winsNeeded=Math.ceil(sf/2);
  const dotR=4, gap=12, padX=14, padY=10;
  const totalW=winsNeeded*gap;
  ctx.save();
  ctx.textAlign='right';ctx.textBaseline='middle';
  ctx.font=`600 11px 'Barlow Condensed',sans-serif`;
  const startY=40;
  CFG.roster.forEach((p,i)=>{
    const wins=seriesScores[p.id]||0;
    const lastName=p.name.split(' ').pop();
    const y=startY+i*22;
    ctx.fillStyle='rgba(180,200,255,.6)';
    ctx.fillText(lastName,W-padX-totalW-6,y);
    for(let d=0;d<winsNeeded;d++){
      const x=W-padX-totalW+d*gap+dotR;
      ctx.beginPath();ctx.arc(x,y,dotR,0,Math.PI*2);
      if(d<wins){
        ctx.fillStyle=p.color;ctx.fill();
      } else {
        ctx.strokeStyle='rgba(180,200,255,.3)';ctx.lineWidth=1;ctx.stroke();
      }
    }
  });
  // Round label
  ctx.textAlign='right';ctx.textBaseline='top';
  ctx.font=`700 10px 'Barlow Condensed',sans-serif`;
  ctx.fillStyle='rgba(130,160,220,.5)';
  ctx.fillText(`ROUND ${seriesRound} OF ${sf}`,W-padX,startY+CFG.roster.length*22+2);
  ctx.restore();
}

function drawSeriesSplash(now){
  const t=Math.min(1,(now-seriesSplashT)/600);
  ctx.save();
  ctx.fillStyle=`rgba(1,1,12,${.95*t})`;ctx.fillRect(0,0,W,H);
  if(t>.15){
    const t2=Math.min(1,(t-.15)/.85);
    ctx.globalAlpha=t2;
    // Round header
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.font=`700 ${W*.045}px 'Barlow Condensed',sans-serif`;
    ctx.fillStyle='rgba(130,170,255,.7)';
    ctx.fillText(`ROUND ${seriesRound} OF ${CFG.seriesFormat} COMPLETE`,CX,H/2-120);

    // Series scores
    const sf=CFG.seriesFormat||1;
    const winsNeeded=Math.ceil(sf/2);
    let y=H/2-50;
    ctx.font=`700 ${W*.055}px 'Barlow Condensed',sans-serif`;
    CFG.roster.forEach((p,i)=>{
      const wins=seriesScores[p.id]||0;
      ctx.fillStyle=wins>0?p.color:'rgba(180,200,255,.4)';
      ctx.textAlign='left';
      ctx.fillText(p.name,CX-180,y);
      ctx.textAlign='right';
      ctx.fillText(wins,CX+180,y);
      // Dots
      for(let d=0;d<winsNeeded;d++){
        const dx=CX+100+d*14;
        ctx.beginPath();ctx.arc(dx,y,4,0,Math.PI*2);
        if(d<wins){ctx.fillStyle=p.color;ctx.fill();}
        else{ctx.strokeStyle='rgba(180,200,255,.25)';ctx.lineWidth=1;ctx.stroke();}
      }
      y+=36;
    });

    // Next round message
    const remaining=3-(now-seriesSplashT)/1000;
    if(remaining>0){
      ctx.textAlign='center';
      ctx.font=`600 ${W*.038}px 'Barlow Condensed',sans-serif`;
      ctx.fillStyle='rgba(165,200,255,.6)';
      ctx.fillText(`Next round in ${Math.ceil(remaining)}...`,CX,y+30);
    }
  }
  ctx.restore();
}

function drawIntroFade(now){
  const p=Math.min(1,(now-phaseT)/2200);

// ════════════════════════════ RECORDING ════════════════════════════
let mRec=null, rChunks=[], rActive=false, rStopT=null;

function toggleRec(){ rActive?stopRec():startRec(); }

function _pickMime(){
  const candidates=['video/webm;codecs=vp9','video/webm;codecs=vp8','video/webm','video/mp4'];
  for(const m of candidates){
    if(MediaRecorder.isTypeSupported(m)){console.log('[REC] Using mimeType:',m);return m;}
  }
  console.warn('[REC] No supported mimeType found, using browser default');
  return '';
}

function _createRecorder(stream, mime){
  try{
    const opts=mime?{mimeType:mime,videoBitsPerSecond:10_000_000}:{};
    const rec=new MediaRecorder(stream,opts);
    console.log('[REC] MediaRecorder created with mimeType:',rec.mimeType);
    return rec;
  }catch(e){
    console.warn('[REC] MediaRecorder constructor failed:',e.message);
    return null;
  }
}

function startRec(){
  if(!canvas.captureStream){alert('Recording not supported in this browser.');return;}
  rChunks=[];

  // Capture canvas video stream
  let vidStream;
  try{ vidStream=canvas.captureStream(60); console.log('[REC] captureStream(60) OK'); }
  catch(e1){
    if(e1.name==='SecurityError'||/origin-clean|tainted|security/i.test(e1.message)){
      console.error('[REC] Canvas tainted — this should not happen with CORS-only loading + initials fallback.');
      alert('Recording failed: canvas tainted by cross-origin images. Reload the page and try again.');
      return;
    }
    try{ vidStream=canvas.captureStream(30); console.log('[REC] captureStream(30) OK (60fps failed)'); }
    catch(e2){ alert('Canvas capture failed: '+e2.message); return; }
  }

  const mime=_pickMime();

  // Try with audio first, fall back to video-only
  let rec=null;
  const audioStream=getAudioStream();
  if(audioStream&&audioStream.getAudioTracks().length>0){
    console.log('[REC] Attempting video+audio recording');
    const combined=new MediaStream([...vidStream.getVideoTracks(),...audioStream.getAudioTracks()]);
    rec=_createRecorder(combined,mime);
  }
  if(!rec){
    console.log('[REC] Falling back to video-only recording');
    rec=_createRecorder(vidStream,mime);
  }
  if(!rec){
    // Last resort: no options at all
    try{rec=new MediaRecorder(vidStream);console.log('[REC] Bare MediaRecorder created');}
    catch(e){alert('MediaRecorder failed: '+e.message);return;}
  }

  mRec=rec;
  mRec.ondataavailable=e=>{
    if(e.data&&e.data.size>0){rChunks.push(e.data);console.log('[REC] chunk:',e.data.size,'bytes');}
  };
  mRec.onerror=e=>console.error('[REC] error:',e);
  mRec.onstop=()=>{console.log('[REC] stopped, chunks:',rChunks.length);downloadRec();};

  try{
    mRec.start(100);
    rActive=true; rStopT=null;
    console.log('[REC] Recording started, state:',mRec.state);
    document.getElementById('recBtn').textContent='⏹ STOP';
    document.getElementById('recBtn').style.color='#ff5566';
    document.getElementById('recDot').style.display='block';
    doRestart();
  }catch(e){
    console.error('[REC] start() failed:',e);
    alert('Recording failed to start: '+e.message);
  }
}

function stopRec(){
  if(mRec&&mRec.state==='recording'){
    console.log('[REC] Stopping recorder…');
    mRec.stop();
  }
  rActive=false; rStopT=null;
  document.getElementById('recBtn').textContent='⏺ REC & DOWNLOAD';
  document.getElementById('recBtn').style.color='';
  document.getElementById('recDot').style.display='none';
}

function downloadRec(){
  if(rChunks.length===0){console.warn('[REC] No data to download');return;}
  const mimeType=mRec?.mimeType||'video/webm';
  const ext=mimeType.includes('mp4')?'mp4':'webm';
  const blob=new Blob(rChunks,{type:mimeType});
  console.log('[REC] Download: blob size',blob.size,'bytes, type',mimeType);
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`hoopshype-battle.${ext}`;
  a.style.display='none';
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},8000);
  console.log('[REC] Download triggered');
}

function checkAutoStop(now){
  if(!rActive||phase!=='end') return;
  if(!rStopT) rStopT=now+6000;
  if(now>=rStopT) stopRec();
}

      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-top:8px;">
        <span class="pct-val" id="ccPctVal" style="font-size:16px;">20%</span>
        <button class="addbtn" style="flex:1;margin:0;" onclick="addCustomFromForm()">+ ADD CHARACTER</button>
      </div>
    </div>`;
  }
  return html;
}

function _lastName(name){const parts=name.trim().split(/\s+/);return(parts[parts.length-1]||'').toLowerCase();}

function buildPPList(q){
  const used=new Set(DRAFT.roster.map(p=>p.id));
  const ql=q?q.toLowerCase():'';
  // Require 2+ chars to search
  if(ql.length<2) return `<div style="padding:10px;color:#334;font-size:11px;">Type 2+ characters to search${FULL_DB_LOADED?' '+FULL_DB.length+' players':''}</div>`;
  const list=FULL_DB.filter(p=>!used.has(p.id)&&(p.name.toLowerCase().includes(ql)||(p.team&&p.team.toLowerCase().includes(ql))));
  // Sort by last name
  list.sort((a,b)=>_lastName(a.name).localeCompare(_lastName(b.name)));
  const total=list.length;
  let html=list.slice(0,20).map(p=>`
    <div class="ppi" onclick="addP(${typeof p.id==='number'?p.id:`'${p.id}'`})">
      <div class="ppi-face"><img src="${p.slug?BASE+p.slug+'.png':NBA_CDN+p.id+'.png'}" onerror="this.src='${NBA_CDN}${p.id}.png'"></div>
      <div><div class="ppi-name">${p.name}</div><div class="ppi-team">${p.team||''}</div></div>
    </div>`).join('');
  if(total>20) html+=`<div style="padding:8px 10px;color:#3366aa;font-size:11px;">${total-20} more — keep typing</div>`;
  return html||'<div style="padding:10px;color:#223;font-size:11px;">No matches</div>';
}

function filterPP(){const q=document.getElementById('psearch')?.value||'';const el=document.getElementById('pplist');if(el)el.innerHTML=buildPPList(q);}
function setPct(i,v){DRAFT.roster[i].winPct=+v;const el=document.getElementById('pv'+i);if(el)el.textContent=v+'%';}
function removeP(i){if(DRAFT.roster.length<=2){alert('Minimum 2 players');return;}DRAFT.roster.splice(i,1);renderTab('players');}
function addP(id){if(DRAFT.roster.length>=10)return;const p=FULL_DB.find(p=>p.id===id);if(!p)return;DRAFT.roster.push({...p,winPct:20,icon:p.icon||'',iconUrl:'',customImg:''});renderTab('players');}

let _customIdCounter=Date.now();
function addCustomFromForm(){
  if(DRAFT.roster.length>=10){alert('Maximum 10 players');return;}
  const name=(document.getElementById('ccName')?.value||'').trim();
  if(!name){alert('Name is required');return;}
  const pct=+(document.getElementById('ccPct')?.value||20);
  const color=document.getElementById('ccColor')?.value||'#ff6644';
  const bg=document.getElementById('ccBg')?.value||'#222244';
  const file=document.getElementById('ccFile')?.files?.[0];
  const addIt=(dataUrl)=>{
    DRAFT.roster.push({id:'custom_'+(++_customIdCounter),slug:'',name,team:'',color,bg,winPct:pct,icon:'',iconUrl:'',customImg:dataUrl||'',_custom:true});
    renderTab('players');
  };
  if(file){
    const reader=new FileReader();
    reader.onload=e=>addIt(e.target.result);
    reader.readAsDataURL(file);
  } else { addIt(''); }
}

function previewCustomImg(i,url){
  DRAFT.roster[i].customImg=url;
  const pv=document.getElementById('cimgpv'+i);
  if(!pv)return;
  if(url){
    pv.style.borderColor=DRAFT.roster[i].color;
    pv.innerHTML=`<img src="${url}" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'">`;
    // Also update pface header
    const pface=pv.closest('.pcard')?.querySelector('.pface');
    if(pface) pface.innerHTML=`<img src="${url}" style="width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'">`;
  } else {
    pv.style.borderColor='#1a1a30';
    pv.innerHTML='';
  }
  // Clear file input since URL takes priority
  const fileInput=document.getElementById('cimgfile'+i);
  if(fileInput) fileInput.value='';
}

function clearCustomImg(i){
  DRAFT.roster[i].customImg='';
  const pv=document.getElementById('cimgpv'+i);
  if(pv){pv.style.borderColor='#1a1a30';pv.innerHTML='';}
  const urlInput=document.getElementById('cimgurl'+i);
  if(urlInput) urlInput.value='';
  const fileInput=document.getElementById('cimgfile'+i);
  if(fileInput) fileInput.value='';
}

function handleFileUpload(i,input){
  const file=input.files&&input.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const dataUrl=e.target.result;
    DRAFT.roster[i].customImg=dataUrl;
    // Update preview circle
    const pv=document.getElementById('cimgpv'+i);
    if(pv){
      pv.style.borderColor=DRAFT.roster[i].color;
      pv.innerHTML=`<img src="${dataUrl}" style="width:100%;height:100%;object-fit:cover;">`;
    }
    // Clear URL field since file upload takes priority
    const urlInput=document.getElementById('cimgurl'+i);
    if(urlInput) urlInput.value='';
    // Also update the pface header image
    const pface=pv?.closest('.pcard')?.querySelector('.pface');
    if(pface) pface.innerHTML=`<img src="${dataUrl}" style="width:100%;height:100%;object-fit:cover;">`;
  };
  reader.readAsDataURL(file);
}

// ── TEAMS ──
function _teamToRosterEntry(t){
  return {id:'team_'+t.abbr, slug:'', name:t.name, team:t.abbr, color:t.color, bg:t.bg,
    winPct:20, icon:'', iconUrl:'', customImg:'', _team:true, _teamId:t.teamId};
}

function buildTeamsTab(){
  let html=`<div style="font-size:11px;color:#334;margin-bottom:10px;line-height:1.5;">Add NBA teams to battle. Teams use their official logo on the ball. Win %, weapons, series, and recording all work the same as players.</div>`;

  // Show current team entries in roster
  DRAFT.roster.forEach((p,i)=>{
    const logoUrl = p._team && p._teamId ? NBA_LOGO_CDN+p._teamId+'/global/L/logo.svg' : '';
    html+=`<div class="pcard">
      <button class="del" onclick="removeP(${i});switchTab('teams')">✕</button>
      <div class="prow">
        <div class="pface" style="background:${p.bg};">${logoUrl?`<img src="${logoUrl}" style="width:80%;height:80%;object-fit:contain;margin:10%;" onerror="this.style.display='none'">`:`<div style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:${p.color};">${p._team?p.team:getInitials(p.name)}</div>`}</div>
        <div class="pinfo"><div class="pname">${p.name}</div><div class="psub">${p.team||''}</div></div>
        <div style="text-align:right;"><div style="font-size:9px;color:#334;text-transform:uppercase;letter-spacing:.8px;">Win %</div>
        <div class="pct-val" id="pv${i}">${p.winPct||10}%</div></div>
      </div>
      <div class="pctrls">
        <div><label>Win % (1–99)</label><input type="range" min="1" max="99" value="${p.winPct||10}" oninput="setPct(${i},this.value)"></div>
        <div><label>Primary</label><input type="color" class="sw" value="${p.color}" oninput="DRAFT.roster[${i}].color=this.value"></div>
        <div><label>BG</label><input type="color" class="sw" value="${p.bg}" oninput="DRAFT.roster[${i}].bg=this.value"></div>
      </div>
      <div style="margin-top:8px;">
        <label class="lbl">Weapon (emoji or image URL — leave blank for saw blade)</label>
        <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px;">
          <input class="fi" style="width:60px;margin:0;text-align:center;font-size:18px;" value="${p.icon||''}" oninput="DRAFT.roster[${i}].icon=this.value" placeholder="🔪">
          <button style="background:#1a1a30;color:#778;border:1px solid #2a2a44;border-radius:4px;padding:4px 8px;cursor:pointer;font-size:11px;" onclick="DRAFT.roster[${i}].icon='';this.previousElementSibling.value=''">✕</button>
          <input class="fi" style="flex:1;margin:0;font-size:11px;" value="${p.iconUrl||''}" oninput="DRAFT.roster[${i}].iconUrl=this.value" placeholder="Weapon image URL (optional)">
        </div>
      </div>
    </div>`;
  });

  if(DRAFT.roster.length<10){
    html+=`<div class="shd">Add NBA Team</div>
    <input class="fi" id="tsearch" placeholder="Search by team name or abbreviation…" oninput="filterTeams()" style="margin-bottom:6px">
    <div class="pplist" id="tplist">${buildTeamList('')}</div>`;
  }

  // Quick-fill button
  html+=`<div style="margin-top:14px;"><button class="addbtn" onclick="teamBattleQuickFill()">🏀 RANDOM 5-TEAM BATTLE</button></div>`;
  return html;
}

function buildTeamList(q){
  const used=new Set(DRAFT.roster.filter(p=>p._team).map(p=>p._teamId));
  const ql=q?q.toLowerCase():'';
  let list=TEAM_DB.filter(t=>!used.has(t.teamId));
  if(ql.length>0) list=list.filter(t=>t.name.toLowerCase().includes(ql)||t.abbr.toLowerCase().includes(ql));
  if(list.length===0) return '<div style="padding:10px;color:#223;font-size:11px;">No matches</div>';
  return list.map(t=>`
    <div class="ppi" onclick="addTeam(${t.teamId})">
      <div class="ppi-face" style="background:${t.bg};display:flex;align-items:center;justify-content:center;">
        <img src="${NBA_LOGO_CDN}${t.teamId}/global/L/logo.svg" style="width:80%;height:80%;object-fit:contain;" onerror="this.outerHTML='<span style=\\'font-size:11px;font-weight:700;color:${t.color}\\'>${t.abbr}</span>'">
      </div>
      <div><div class="ppi-name">${t.name}</div><div class="ppi-team">${t.abbr}</div></div>
    </div>`).join('');
}

function filterTeams(){const q=document.getElementById('tsearch')?.value||'';const el=document.getElementById('tplist');if(el)el.innerHTML=buildTeamList(q);}

function addTeam(teamId){
  if(DRAFT.roster.length>=10) return;
  const t=TEAM_DB.find(t=>t.teamId===teamId);
  if(!t) return;
  DRAFT.roster.push(_teamToRosterEntry(t));
  renderTab('teams');
}

function teamBattleQuickFill(){
  // Pick 5 random unique teams
  const shuffled=[...TEAM_DB].sort(()=>Math.random()-.5);
  DRAFT.roster=shuffled.slice(0,5).map(t=>_teamToRosterEntry(t));
  renderTab('teams');
}

// ── GAME ──
function buildGameTab(){
  const shapes=[{id:'circle',emoji:'⭕',label:'Circle'},{id:'square',emoji:'⬛',label:'Square'},{id:'triangle',emoji:'🔺',label:'Triangle'},{id:'hexagon',emoji:'⬡',label:'Hexagon'}];
  const cur=DRAFT.arenaShape||'circle';
  const sf=DRAFT.seriesFormat||1;
  const seriesOpts=[{v:1,label:'Single'},{v:3,label:'Best of 3'},{v:5,label:'Best of 5'},{v:7,label:'Best of 7'}];
  return`
    <div class="shd">Arena Shape</div>
    <div class="weapon-sel" style="grid-template-columns:repeat(4,1fr);margin-bottom:14px;">
      ${shapes.map(s=>`<div class="wp${s.id===cur?' on':''}" title="${s.label}" onclick="setShape('${s.id}',this)">${s.emoji}<div style="font-size:9px;margin-top:2px;color:#778;">${s.label}</div></div>`).join('')}
    </div>
    <div class="shd">Series Format</div>
    <div class="weapon-sel" style="grid-template-columns:repeat(4,1fr);margin-bottom:14px;">
      ${seriesOpts.map(s=>`<div class="wp${s.v===sf?' on':''}" onclick="setSeriesFormat(${s.v},this)"><div style="font-size:12px;font-weight:700;color:#ccd;">${s.label}</div></div>`).join('')}
    </div>
    <div class="shd">Round Timer</div>
    <p style="font-size:11px;color:#336;line-height:1.5;margin-bottom:10px;">Each phase lasts a random time between Min and Max seconds. Players are eliminated only when their energy reaches 0.</p>
    <div class="r2">
      <div><label class="lbl">Min seconds (10–80)</label><input id="gtmin" class="fi" type="number" min="10" max="80" value="${DRAFT.roundMinSec}"></div>
      <div><label class="lbl">Max seconds (20–90)</label><input id="gtmax" class="fi" type="number" min="20" max="90" value="${DRAFT.roundMaxSec}"></div>
    </div>
  `;
}

function setSeriesFormat(v,el){
  DRAFT.seriesFormat=v;
  el.closest('.weapon-sel').querySelectorAll('.wp').forEach(w=>w.classList.remove('on'));
  el.classList.add('on');
}

function setShape(id,el){
  DRAFT.arenaShape=id;
  el.closest('.weapon-sel').querySelectorAll('.wp').forEach(w=>w.classList.remove('on'));
  el.classList.add('on');
}

// ── TEXT ──
function buildTextTab(){
  return`
    <div class="shd">Title & Subtitle</div>
    <label class="lbl">Title Line 1</label><input class="fi" id="tt0" value="${DRAFT.title[0]||''}">
    <label class="lbl">Title Line 2 (optional)</label><input class="fi" id="tt1" value="${DRAFT.title[1]||''}">
    <label class="lbl">Subtitle</label><input class="fi" id="tsub" value="${DRAFT.subtitle}">
    <div class="shd">In-Game</div>
    <div class="r2">
      <div><label class="lbl">Eliminated message</label><input class="fi" id="tel" value="${DRAFT.elimMsg}"></div>
      <div><label class="lbl">Winner message</label><input class="fi" id="twm" value="${DRAFT.winnerMsg}"></div>
    </div>
    <div class="shd">End Screen</div>
    <label class="lbl">Engagement prompt</label><input class="fi" id="trob" value="${DRAFT.robbed}">
    <label class="lbl">Watermark</label><input class="fi" id="twat" value="${DRAFT.watermark}">
  `;
}

function applyClose(){
  // Game
  const tmin=+document.getElementById('gtmin')?.value;
  const tmax=+document.getElementById('gtmax')?.value;
  if(tmin) DRAFT.roundMinSec=Math.min(80,Math.max(10,tmin));
  if(tmax) DRAFT.roundMaxSec=Math.min(90,Math.max(20,tmax));
  // arenaShape is already set via setShape()
  // Text
  const v=id=>document.getElementById(id)?.value;
  const t0=v('tt0'),t1=v('tt1');
  if(t0!==undefined) DRAFT.title=t1?[t0,t1]:[t0];
  ['sub','el','wm','rob','wat'].forEach(k=>{
    const map={sub:'subtitle',el:'elimMsg',wm:'winnerMsg',rob:'robbed',wat:'watermark'};
    const val=v('t'+k); if(val!==undefined) DRAFT[map[k]]=val;
  });
  Object.assign(CFG,{...DRAFT,roster:DRAFT.roster.map(p=>({...p}))});
  closeModal();
  doRestart();
}

// ════════════════════════════ BOOT ════════════════════════════
initSeries();
startGame();
lastT=performance.now();
requestAnimationFrame(loop);
</script>
